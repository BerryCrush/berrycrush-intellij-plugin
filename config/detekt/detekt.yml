# Detekt Configuration for IntelliJ Plugin
# https://detekt.dev/docs/rules/
# Configured for detekt 1.23.x
# Thresholds adjusted for IDE plugin complexity

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 130  # IDE plugins have complex PSI handling
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 8
  ComplexCondition:
    active: true
    threshold: 5
  CyclomaticComplexMethod:
    active: true
    threshold: 40  # Lexers and PSI handlers can be complex
  NestedBlockDepth:
    active: true
    threshold: 10  # PSI traversal needs deeper nesting
  TooManyFunctions:
    active: true
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInInterfaces: 15
    thresholdInObjects: 20
    thresholdInEnums: 10

performance:
  active: true
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true
  ArrayPrimitive:
    active: true

potential-bugs:
  active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  HasPlatformType:
    active: true
  ImplicitDefaultLocale:
    active: true
  InvalidRange:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  LateinitUsage:
    active: false
  UnconditionalJumpStatementInLoop:
    active: true
  UnreachableCatchBlock:
    active: true
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true

style:
  active: true
  ReturnCount:
    active: true
    max: 25  # Lexers have many returns for different token types
    excludeReturnFromLambda: true
    excludeGuardClauses: true
  ThrowsCount:
    active: true
    max: 2
  MagicNumber:
    active: false  # Lexers use literal numbers for token matching
  WildcardImport:
    active: true
    excludeImports: []
  MaxLineLength:
    active: true
    maxLineLength: 140  # Longer lines for complex PSI expressions

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false  # IDE plugins often catch Exception to prevent UI issues
  SwallowedException:
    active: false  # Defensive coding in IDE plugins

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][a-zA-Z0-9]*'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
