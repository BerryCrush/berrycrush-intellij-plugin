site_name: BerryCrush IntelliJ Plugin
site_description: IntelliJ IDEA Plugin for BerryCrush Scenario Files
site_url: https://intellij.berrycrush.org/
docs_dir: doc
site_dir: _site

extra:
  homepage: https://berrycrush.org

theme:
  name: material
  palette:
    primary: deep-purple
    accent: pink
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/solid/house

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Features:
    - Syntax Highlighting: features/syntax.md
    - Navigation: features/navigation.md
    - Refactoring: features/refactoring.md
    - Inspections: features/inspections.md
    - Quick Fixes: features/quickfixes.md
    - Test Runner: features/test-runner.md
    - OpenAPI Integration: features/openapi.md
  - Configuration:
    - Settings: configuration/settings.md
  - Development:
    - Setup: development/setup.md
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
